syntax = "proto3";
package errcode;

import "patch/go.proto";;

option java_package = "xyz.hoper.scaffold.errcode";
option go_package = "github.com/hopeio/scaffold/errcode";

enum ErrCode {
  Success = 0 [(go.enum).value = "成功",(go.value).name = "Success"];
  Canceled = 1 [(go.enum).value = "操作取消",(go.value).name = "Canceled"];
  Unknown = 2 [(go.enum).value = "未知错误",(go.value).name = "Unknown"];
  InvalidArgument = 3 [(go.enum).value = "无效的参数",(go.value).name = "InvalidArgument"];
  DeadlineExceeded = 4 [(go.enum).value = "响应超时",(go.value).name = "DeadlineExceeded"];
  NotFound = 5 [(go.enum).value = "未发现",(go.value).name = "NotFound"];
  AlreadyExists = 6 [(go.enum).value = "已经存在",(go.value).name = "AlreadyExists"];
  PermissionDenied = 7 [(go.enum).value = "操作无权限",(go.value).name = "PermissionDenied"];
  ResourceExhausted = 8 [(go.enum).value = "资源不足",(go.value).name = "ResourceExhausted"];
  FailedPrecondition = 9 [(go.enum).value = "操作被拒绝",(go.value).name = "FailedPrecondition"];
  Aborted = 10 [(go.enum).value = "操作终止",(go.value).name = "Aborted"];
  OutOfRange = 11 [(go.enum).value = "超出范围",(go.value).name = "OutOfRange"];
  Unimplemented = 12 [(go.enum).value = "未实现",(go.value).name = "Unimplemented"];
  Internal = 13 [(go.enum).value = "内部错误",(go.value).name = "Internal"];
  Unavailable = 14 [(go.enum).value = "服务不可用",(go.value).name = "Unavailable"];
  DataLoss = 15 [(go.enum).value = "数据丢失",(go.value).name = "DataLoss"];
  Unauthenticated = 16 [(go.enum).value = "身份未验证",(go.value).name = "Unauthenticated"];


  SysError = 10000 [(go.enum).value = "系统错误",(go.value).name = "SysError"];


  DBError = 21000 [(go.enum).value = "数据库错误",(go.value).name = "DBError"];
  RowExists = 21001 [(go.enum).value = "记录已存在",(go.value).name = "RowExists"];
  RedisErr = 22000 [(go.enum).value = "Redis错误",(go.value).name = "RedisErr"];

  IOError = 30000 [(go.enum).value = "io错误",(go.value).name = "IOError"];
  UploadFail = 30001 [(go.enum).value = "上传失败",(go.value).name = "UploadFail"];
  UploadCheckFail = 30002 [(go.enum).value = "检查文件失败",(go.value).name = "UploadCheckFail"];
  UploadCheckFormat = 30003 [(go.enum).value = "文件格式或大小有问题",(go.value).name = "UploadCheckFormat"];

  TimesTooMuch = 30004 [(go.enum).value = "尝试次数过多",(go.value).name = "TimesTooMuch"];
}